<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оргструктура</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep: #0B1826;
    --bg-grid-dot: #1B2E42;
    --card-paper: #F4F0E6;
    --card-paper-edge: #E4DDC9;
    --ink: #1C1B18;
    --ink-soft: #5C574C;
    --accent-cyan: #4FC3D9;
    --accent-cyan-dim: #2A6E7D;
    --lvl-0: #3FA98A;
    --lvl-1: #D9A441;
    --lvl-2: #A672C2;
    --lvl-3: #D96A6A;
    --panel-bg: rgba(14,26,40,0.92);
    --danger: #D96A6A;
    --ui-text: #EAF3F5;
    --ui-text-dim: #6B93A3;
    --ui-border: rgba(255,255,255,0.15);
    --ui-border-soft: rgba(255,255,255,0.08);
    --ui-hover-bg: rgba(255,255,255,0.08);
    --overlay-bg: rgba(6,12,20,0.6);
    --scrollbar-thumb: rgba(255,255,255,0.15);
  }
  body.light-theme{
    --bg-deep: #EDE9DE;
    --bg-grid-dot: #D9D2BE;
    --panel-bg: rgba(255,255,255,0.85);
    --ui-text: #1C1B18;
    --ui-text-dim: #6b6558;
    --ui-border: rgba(0,0,0,0.14);
    --ui-border-soft: rgba(0,0,0,0.08);
    --ui-hover-bg: rgba(0,0,0,0.06);
    --overlay-bg: rgba(30,26,18,0.35);
    --scrollbar-thumb: rgba(0,0,0,0.18);
    --accent-cyan-dim: #2A8E9D;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--bg-deep);font-family:'Inter',sans-serif; transition:background-color .2s ease;}

  #world-wrapper{
    position:absolute; inset:0;
    background-image:
      radial-gradient(circle, var(--bg-grid-dot) 1.2px, transparent 1.2px);
    background-size: 34px 34px;
    background-position: 0 0;
    cursor:grab;
  }
  #world-wrapper.grabbing{cursor:grabbing;}

  #world{
    position:absolute; top:0; left:0;
    transform-origin: 0 0;
    will-change: transform;
  }

  svg#connectors{position:absolute; top:0; left:0; overflow:visible; pointer-events:none;}
  .connector-path{fill:none; stroke:var(--accent-cyan-dim); stroke-width:2;}

  .node-card{
    position:absolute;
    width:214px;
    background:var(--card-paper);
    border:1px solid var(--card-paper-edge);
    box-shadow: 0 2px 0 rgba(0,0,0,0.25);
    cursor:pointer;
    user-select:none;
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    color:var(--ink);
  }
  .node-card .tab{
    height:6px; width:100%;
  }
  .node-card .body{padding:12px 14px 10px;}
  .node-card .body-row{display:flex; gap:10px; align-items:flex-start;}
  .node-card .body-text{min-width:0; flex:1;}
  .card-photo{
    width:34px; height:44px; flex-shrink:0; border-radius:3px; object-fit:cover;
    border:1px solid var(--card-paper-edge);
  }
  .card-photo-empty{background:repeating-linear-gradient(135deg, var(--card-paper-edge), var(--card-paper-edge) 3px, transparent 3px, transparent 6px);}
  .node-card .title{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:4px;
  }
  .node-card .name{
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:15px;
    line-height:1.25;
  }
  .node-card .footer{
    display:flex; justify-content:space-between; align-items:center;
    margin-top:8px; padding-top:6px;
    border-top:1px dashed var(--card-paper-edge);
    font-family:'IBM Plex Mono',monospace;
    font-size:9px; color:var(--ink-soft);
  }
  .node-card:hover{
    transform: translateY(-4px);
    box-shadow: 0 8px 18px rgba(0,0,0,0.35), 0 0 0 2px var(--accent-cyan);
  }
  .node-card.selected{
    box-shadow: 0 8px 18px rgba(0,0,0,0.35), 0 0 0 2px var(--accent-cyan);
    transform: translateY(-4px);
  }

  /* Toolbar */
  #toolbar{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:10px;
    background:var(--panel-bg);
    border:1px solid var(--ui-border-soft);
    padding:8px 10px; border-radius:10px;
    backdrop-filter: blur(6px);
    z-index:50;
  }
  .btn{
    font-family:'Inter',sans-serif; font-size:13px; font-weight:500;
    background:transparent; color:var(--ui-text); border:1px solid var(--ui-border);
    padding:8px 12px; border-radius:7px; cursor:pointer;
    transition: background .15s, border-color .15s;
  }
  .btn:hover{background:var(--ui-hover-bg); border-color:var(--ui-border);}
  .btn.primary{background:var(--accent-cyan); color:#0B1826; border-color:var(--accent-cyan); font-weight:600;}
  .btn.primary:hover{background:#68d2e4;}
  .btn.icon{width:34px; padding:8px 0; text-align:center;}
  #zoom-label{font-family:'IBM Plex Mono',monospace; color:var(--ui-text-dim); font-size:12px; min-width:42px; text-align:center;}

  /* Top bar */
  #topbar{
    position:fixed; top:18px; left:18px; z-index:50;
    font-family:'Space Grotesk',sans-serif; color:var(--ui-text);
  }
  #topbar .brand{font-size:15px; font-weight:600; letter-spacing:0.02em;}
  #topbar .sub{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--ui-text-dim); margin-top:2px;}

  #theme-toggle{
    position:fixed; top:18px; right:18px; z-index:50;
    width:40px; height:40px; border-radius:10px;
    background:var(--panel-bg); border:1px solid var(--ui-border-soft);
    color:var(--ui-text); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(6px);
    transition:background .15s, border-color .15s;
  }
  #theme-toggle:hover{background:var(--ui-hover-bg);}

  /* Modal (add position) */
  .overlay{
    position:fixed; inset:0; background:var(--overlay-bg);
    display:flex; align-items:center; justify-content:center;
    z-index:200; opacity:0; pointer-events:none; transition:opacity .15s;
  }
  .overlay.open{opacity:1; pointer-events:auto;}
  .modal{
    background:var(--card-paper); width:340px; padding:22px;
    border-radius:4px; box-shadow:0 20px 50px rgba(0,0,0,0.5);
    font-family:'Inter',sans-serif; color:var(--ink);
  }
  .modal h3{
    font-family:'Space Grotesk',sans-serif; margin:0 0 16px; font-size:17px;
  }
  .field{margin-bottom:14px;}
  .field label{
    display:block; font-family:'IBM Plex Mono',monospace; font-size:10px;
    text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-soft); margin-bottom:5px;
  }
  .field input, .field select, .field textarea{
    width:100%; padding:8px 10px; border:1px solid var(--card-paper-edge);
    border-radius:4px; font-family:'Inter',sans-serif; font-size:14px;
    background:#fff; color:var(--ink);
  }
  .field textarea{resize:vertical; min-height:60px;}
  .photo-row{display:flex; gap:12px; align-items:flex-start;}
  .photo-preview{
    width:76px; height:100px; flex-shrink:0;
    border:1px solid var(--card-paper-edge); border-radius:4px;
    background:#fff; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--ink-soft); text-align:center; padding:4px;
  }
  .photo-preview img{width:100%; height:100%; object-fit:cover;}
  .modal-actions{display:flex; justify-content:flex-end; gap:8px; margin-top:18px;}
  .btn-dark{background:var(--ink); color:#F4F0E6; border:none; padding:8px 14px; border-radius:4px; cursor:pointer; font-size:13px;}
  .btn-icon-square{
    background:transparent; border:1px solid var(--card-paper-edge); color:var(--ink-soft);
    width:36px; height:36px; border-radius:4px; cursor:pointer; flex-shrink:0;
    display:inline-flex; align-items:center; justify-content:center;
    transition:background .15s, color .15s, border-color .15s;
  }
  .btn-icon-square:hover{background:var(--ink); color:#F4F0E6; border-color:var(--ink);}
  #dossier.solo #d-goto-link{display:none;}
  .btn-ghost{background:transparent; color:var(--ink-soft); border:1px solid var(--card-paper-edge); padding:8px 14px; border-radius:4px; cursor:pointer; font-size:13px;}

  /* Detail / dossier panel */
  #dossier{
    position:fixed; top:0; right:0; height:100%; width:420px; max-width:92vw;
    background:var(--card-paper); z-index:150;
    box-shadow:-10px 0 40px rgba(0,0,0,0.4);
    transform:translateX(100%); transition:transform .25s ease;
    overflow-y:auto; color:var(--ink); font-family:'Inter',sans-serif;
  }
  #dossier.open{transform:translateX(0);}

  /* Solo mode: opened directly via a personal link, shown as its own standalone page */
  body.solo-mode #topbar, body.solo-mode #world-wrapper, body.solo-mode #toolbar{display:none;}
  body.solo-mode{background:var(--bg-deep);}
  #dossier.solo{
    position:fixed; top:50%; left:50%; right:auto;
    transform:translate(-50%,-50%);
    width:480px; max-width:92vw; max-height:88vh;
    border-radius:6px;
    box-shadow:0 30px 80px rgba(0,0,0,0.55);
  }
  #dossier.solo.open{transform:translate(-50%,-50%);}
  #dossier .d-back{
    display:none;
    font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.04em;
    color:var(--accent-cyan-dim); text-decoration:none; cursor:pointer;
    margin-bottom:10px;
  }
  #dossier.solo .d-back{display:inline-block;}
  #dossier .d-tab{height:8px;}
  #dossier .d-head{padding:24px 24px 14px; border-bottom:1px dashed var(--card-paper-edge);}
  #dossier .d-close{
    position:absolute; top:18px; right:18px; background:none; border:none;
    font-size:20px; cursor:pointer; color:var(--ink-soft); line-height:1;
  }
  #dossier .d-title{font-family:'IBM Plex Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-soft);}
  #dossier .d-name{font-family:'Space Grotesk',sans-serif; font-size:24px; font-weight:700; margin-top:6px;}
  #dossier .d-body{padding:20px 24px;}
  #dossier .d-actions{display:flex; gap:8px; padding:0 24px 24px;}

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb); border-radius:4px;}
</style>
</head>
<body>

  <div class="brand">Оргструктура</div>

</div>

<button id="theme-toggle" title="Сменить тему">

  <svg id="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
</button>

<div id="world-wrapper">

  </div>
</div>

<div id="toolbar">
  <button class="btn icon" id="zoom-out">–</button>

<script>
const LEVEL_COLORS = ['var(--lvl-0)','var(--lvl-1)','var(--lvl-2)','var(--lvl-3)'];
const STORAGE_KEY = 'orgchart-tree-v1';

let nodes = {};        // id -> {id,title,name,managerId,dept,email,phone}
let selectedId = null;
let scale = 1, panX = 60, panY = 60;

const worldWrapper = document.getElementById('world-wrapper');
const world = document.getElementById('world');
const svg = document.getElementById('connectors');

function uid(){ return 'p_' + Math.random().toString(36).slice(2,9); }

// Resize/compress an uploaded photo to a passport-style thumbnail (keeps stored data small).
function fileToPhotoDataUrl(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('read failed'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('decode failed'));
      img.onload = () => {
        const targetW = 240, targetH = 320; // 3:4 passport-style ratio
        const canvas = document.createElement('canvas');
        canvas.width = targetW; canvas.height = targetH;
        const ctx = canvas.getContext('2d');
        const scale = Math.max(targetW / img.width, targetH / img.height);
        const sw = targetW / scale, sh = targetH / scale;
        const sx = (img.width - sw) / 2, sy = (img.height - sh) / 2;
        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, targetW, targetH);
        resolve(canvas.toDataURL('image/jpeg', 0.85));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function positionUrl(id){
  return window.location.href.split('#')[0] + '#p=' + id;
}

function defaultData(){
  const ceo = uid();
  const cto = uid();
  const cfo = uid();
  const dev = uid();
  return {
    [ceo]: {id:ceo, title:'Генеральный директор', name:'Смирнова Анна', managerId:null, dept:'Правление', email:'', phone:''},
    [cto]: {id:cto, title:'Технический директор', name:'Козлов Дмитрий', managerId:ceo, dept:'Технологии', email:'', phone:''},
    [cfo]: {id:cfo, title:'Финансовый директор', name:'Петрова Елена', managerId:ceo, dept:'Финансы', email:'', phone:''},
    [dev]: {id:dev, title:'Ведущий разработчик', name:'Николаев Артём', managerId:cto, dept:'Разработка', email:'', phone:''},
  };
}

async function loadData(){
  try{
    const v = localStorage.getItem(STORAGE_KEY);
    if(v){
      nodes = JSON.parse(v);
      return;
    }
  }catch(e){ /* corrupted or empty, fall through to defaults */ }
  nodes = defaultData();
  await saveData();
}

async function saveData(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(nodes));
  }catch(e){ console.error('Ошибка сохранения', e); alert('Не удалось сохранить данные в этом браузере.'); }
}

function children(id){
  return Object.values(nodes).filter(n => n.managerId === id);
}
function roots(){
  return Object.values(nodes).filter(n => !n.managerId || !nodes[n.managerId]);
}

// ---- Layout (simple tree layout) ----
const SPACING_X = 250, SPACING_Y = 150;
let layoutPos = {}; // id -> {x,y,depth}

function computeLayout(){
  layoutPos = {};
  let leafCounter = 0;

  function place(node, depth){
    const kids = children(node.id);
    if(kids.length === 0){
      layoutPos[node.id] = {x: leafCounter * SPACING_X, y: depth * SPACING_Y, depth};
      leafCounter++;
    } else {
      kids.forEach(k => place(k, depth+1));
      const xs = kids.map(k => layoutPos[k.id].x);
      const cx = (Math.min(...xs) + Math.max(...xs)) / 2;
      layoutPos[node.id] = {x: cx, y: depth*SPACING_Y, depth};
    }
  }
  roots().forEach(r => { place(r, 0); leafCounter += 1; });
}

// ---- Rendering ----
function render(){
  computeLayout();
  // clear
  world.querySelectorAll('.node-card').forEach(el => el.remove());
  svg.innerHTML = '';

  let maxX = 0, maxY = 0;
  Object.values(nodes).forEach(n => {
    const pos = layoutPos[n.id];
    maxX = Math.max(maxX, pos.x); maxY = Math.max(maxY, pos.y);

    // connector to manager
    if(n.managerId && nodes[n.managerId] && layoutPos[n.managerId]){
      const p = layoutPos[n.managerId];
      const x1 = p.x + 107, y1 = p.y + 84;
      const x2 = pos.x + 107, y2 = pos.y;
      const midY = (y1 + y2) / 2;
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d', `M ${x1} ${y1} C ${x1} ${midY}, ${x2} ${midY}, ${x2} ${y2}`);
      path.setAttribute('class','connector-path');
      svg.appendChild(path);
    }

    const card = document.createElement('div');
    card.className = 'node-card';
    card.style.left = pos.x + 'px';
    card.style.top = pos.y + 'px';
    card.dataset.id = n.id;
    const color = LEVEL_COLORS[pos.depth % LEVEL_COLORS.length];
    const photoHtml = n.photo
      ? `<img src="${n.photo}" class="card-photo">`
      : `<div class="card-photo card-photo-empty"></div>`;
    card.innerHTML = `
      <div class="tab" style="background:${color}"></div>
      <div class="body">
        <div class="body-row">
          ${photoHtml}
          <div class="body-text">
            <div class="title">${escapeHtml(n.title || 'Без названия')}</div>
            <div class="name">${escapeHtml(n.name || '—')}</div>
          </div>
        </div>
        <div class="footer"><span>${n.dept ? escapeHtml(n.dept) : '—'}</span><span>${n.id.slice(2,7).toUpperCase()}</span></div>
      </div>`;
    card.addEventListener('click', (e) => { e.stopPropagation(); openDossier(n.id); });
    world.appendChild(card);
  });

  svg.setAttribute('width', maxX + 400);
  svg.setAttribute('height', maxY + 300);

  document.getElementById('node-count').textContent = Object.keys(nodes).length + ' должностей';
  populateManagerSelects();
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function applyTransform(){
  world.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  document.getElementById('zoom-label').textContent = Math.round(scale*100) + '%';
}

// ---- Pan & zoom ----
let dragging = false, dragStartX=0, dragStartY=0, panStartX=0, panStartY=0;

worldWrapper.addEventListener('pointerdown', (e) => {
  dragging = true;
  worldWrapper.classList.add('grabbing');
  dragStartX = e.clientX; dragStartY = e.clientY;
  panStartX = panX; panStartY = panY;
});
window.addEventListener('pointermove', (e) => {
  if(!dragging) return;
  panX = panStartX + (e.clientX - dragStartX);
  panY = panStartY + (e.clientY - dragStartY);
  applyTransform();
});
window.addEventListener('pointerup', () => { dragging = false; worldWrapper.classList.remove('grabbing'); });

worldWrapper.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.08 : 0.08;
  zoomBy(delta, e.clientX, e.clientY);
}, {passive:false});

function zoomBy(delta, cx, cy){
  const newScale = Math.min(2.2, Math.max(0.3, scale + delta));
  if(cx !== undefined){
    const rect = worldWrapper.getBoundingClientRect();
    const wx = (cx - rect.left - panX) / scale;
    const wy = (cy - rect.top - panY) / scale;
    panX = cx - rect.left - wx * newScale;
    panY = cy - rect.top - wy * newScale;
  }
  scale = newScale;
  applyTransform();
}

document.getElementById('zoom-in').onclick = () => zoomBy(0.15);
document.getElementById('zoom-out').onclick = () => zoomBy(-0.15);
document.getElementById('reset-view').onclick = () => { scale = 1; panX = 60; panY = 60; applyTransform(); };

// ---- Add position modal ----
const overlay = document.getElementById('modal-overlay');
let pendingAddPhoto = '';

function resetAddPhoto(){
  pendingAddPhoto = '';
  document.getElementById('f-photo-preview').style.display = 'none';
  document.getElementById('f-photo-placeholder').style.display = '';
  document.getElementById('f-photo-remove').style.display = 'none';
  document.getElementById('f-photo').value = '';
}

document.getElementById('add-btn').onclick = () => {
  document.getElementById('f-title').value = '';
  document.getElementById('f-name').value = '';
  document.getElementById('f-dept').value = '';
  resetAddPhoto();
  overlay.classList.add('open');
};
document.getElementById('modal-cancel').onclick = () => overlay.classList.remove('open');
overlay.addEventListener('click', (e) => { if(e.target === overlay) overlay.classList.remove('open'); });

document.getElementById('f-photo-btn').onclick = () => document.getElementById('f-photo').click();
document.getElementById('f-photo').onchange = async (e) => {
  const file = e.target.files[0];
  if(!file) return;
  try{
    pendingAddPhoto = await fileToPhotoDataUrl(file);
    const img = document.getElementById('f-photo-preview');
    img.src = pendingAddPhoto;
    img.style.display = '';
    document.getElementById('f-photo-placeholder').style.display = 'none';
    document.getElementById('f-photo-remove').style.display = '';
  }catch(err){ alert('Не удалось обработать изображение.'); }
};
document.getElementById('f-photo-remove').onclick = () => resetAddPhoto();

document.getElementById('modal-save').onclick = async () => {
  const title = document.getElementById('f-title').value.trim();
  const name = document.getElementById('f-name').value.trim();
  const managerId = document.getElementById('f-manager').value || null;
  if(!title){ alert('Укажите название должности'); return; }
  const dept = document.getElementById('f-dept').value.trim();
  const id = uid();
  nodes[id] = {id, title, name, managerId, dept, email:'', phone:'', photo: pendingAddPhoto || ''};
  await saveData();
  render();
  applyTransform();
  overlay.classList.remove('open');
};

function populateManagerSelects(){
  const options = ['<option value="">— Нет (верхний уровень)</option>']
    .concat(Object.values(nodes).map(n => `<option value="${n.id}">${escapeHtml(n.title)} — ${escapeHtml(n.name||'—')}</option>`));
  document.getElementById('f-manager').innerHTML = options.join('');
  document.getElementById('d-manager').innerHTML = options.join('');
}

// ---- Dossier panel ----
const dossier = document.getElementById('dossier');

let pendingEditPhoto; // undefined = no change, null = removed, string = new photo

function refreshDossierPhoto(n){
  const hasPhoto = pendingEditPhoto !== undefined ? !!pendingEditPhoto : !!n.photo;
  const src = pendingEditPhoto !== undefined ? pendingEditPhoto : n.photo;
  const headImg = document.getElementById('dossier-photo');
  const headPlaceholder = document.getElementById('dossier-photo-placeholder');
  const editImg = document.getElementById('d-photo-preview');
  const editPlaceholder = document.getElementById('d-photo-placeholder');
  const removeBtn = document.getElementById('d-photo-remove');
  if(hasPhoto && src){
    headImg.src = src; headImg.style.display = ''; headPlaceholder.style.display = 'none';
    editImg.src = src; editImg.style.display = ''; editPlaceholder.style.display = 'none';
    removeBtn.style.display = '';
  } else {
    headImg.style.display = 'none'; headPlaceholder.style.display = '';
    editImg.style.display = 'none'; editPlaceholder.style.display = '';
    removeBtn.style.display = 'none';
  }
}

function openDossier(id){
  selectedId = id;
  pendingEditPhoto = undefined;
  const n = nodes[id];
  document.getElementById('dossier-role').textContent = n.title || 'Без названия';
  document.getElementById('dossier-name').textContent = n.name || '—';
  const depth = (layoutPos[id] && layoutPos[id].depth) || 0;
  document.getElementById('dossier-tab').style.background = LEVEL_COLORS[depth % LEVEL_COLORS.length];
  document.getElementById('d-link').value = positionUrl(id);
  document.getElementById('d-goto-link').href = positionUrl(id);
  refreshDossierPhoto(n);
  document.getElementById('d-dept').value = n.dept || '';
  document.getElementById('d-email').value = n.email || '';
  document.getElementById('d-phone').value = n.phone || '';
  populateManagerSelects();
  document.getElementById('d-manager').value = n.managerId || '';
  const subs = children(id);
  document.getElementById('d-subs').textContent = subs.length ? subs.map(s=>s.name||s.title).join(', ') : 'Нет подчинённых';

  document.querySelectorAll('.node-card').forEach(c => c.classList.toggle('selected', c.dataset.id === id));
  dossier.classList.add('open');
}
document.getElementById('dossier-close').onclick = () => {
  if(document.body.classList.contains('solo-mode')){
    exitSoloMode();
    return;
  }
  dossier.classList.remove('open');
  document.querySelectorAll('.node-card').forEach(c => c.classList.remove('selected'));
  selectedId = null;
};

const COPY_ICON = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
const CHECK_ICON = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;

document.getElementById('d-copy-link').onclick = async () => {
  const input = document.getElementById('d-link');
  input.select();
  const btn = document.getElementById('d-copy-link');
  try{
    await navigator.clipboard.writeText(input.value);
    btn.innerHTML = CHECK_ICON;
    btn.title = 'Скопировано';
    setTimeout(() => { btn.innerHTML = COPY_ICON; btn.title = 'Копировать ссылку'; }, 1200);
  }catch(e){ /* clipboard may be blocked in sandboxed preview */ }
};

document.getElementById('d-photo-btn').onclick = () => document.getElementById('d-photo').click();
document.getElementById('d-photo').onchange = async (e) => {
  const file = e.target.files[0];
  if(!file) return;
  try{
    pendingEditPhoto = await fileToPhotoDataUrl(file);
    refreshDossierPhoto(nodes[selectedId]);
  }catch(err){ alert('Не удалось обработать изображение.'); }
};
document.getElementById('d-photo-remove').onclick = () => {
  pendingEditPhoto = null;
  refreshDossierPhoto(nodes[selectedId]);
};

document.getElementById('d-save').onclick = async () => {
  if(!selectedId) return;
  const n = nodes[selectedId];
  const newManager = document.getElementById('d-manager').value || null;
  if(newManager === selectedId){ alert('Должность не может быть руководителем самой себя'); return; }
  n.dept = document.getElementById('d-dept').value.trim();
  n.email = document.getElementById('d-email').value.trim();
  n.phone = document.getElementById('d-phone').value.trim();
  n.managerId = newManager;
  if(pendingEditPhoto !== undefined){ n.photo = pendingEditPhoto || ''; }
  await saveData();
  render();
  applyTransform();
  openDossier(selectedId);
};

function buildStandaloneProfileHtml(n){
  const managerName = n.managerId && nodes[n.managerId] ? (nodes[n.managerId].name || nodes[n.managerId].title) : '—';
  const subs = children(n.id);
  const subsHtml = subs.length
    ? subs.map(s => `<li>${escapeHtml(s.name || '—')} — ${escapeHtml(s.title || '')}</li>`).join('')
    : '<li>Нет подчинённых</li>';
  return `<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>${escapeHtml(n.name || n.title)} — анкета</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  body{margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:#0B1826; background-image:radial-gradient(circle,#1B2E42 1.2px,transparent 1.2px);
    background-size:34px 34px; font-family:'Inter',sans-serif;}
  .card{background:#F4F0E6; width:480px; max-width:92vw; border-radius:6px; box-shadow:0 30px 80px rgba(0,0,0,0.55); color:#1C1B18; overflow:hidden;}
  .tab{height:8px; background:#4FC3D9;}
  .head{padding:24px 24px 14px; border-bottom:1px dashed #E4DDC9; display:flex; gap:16px; align-items:flex-start;}
  .head-photo{width:84px; height:110px; flex-shrink:0; border-radius:4px; object-fit:cover; border:1px solid #E4DDC9;}
  .role{font-family:'IBM Plex Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:#5C574C;}
  .name{font-family:'Space Grotesk',sans-serif; font-size:24px; font-weight:700; margin-top:6px;}
  .body{padding:20px 24px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.05em; color:#5C574C; margin-bottom:5px;}
  .field .val{font-size:14px;}
  ul{margin:0; padding-left:18px; font-size:13px;}
  .stamp{padding:14px 24px 22px; font-family:'IBM Plex Mono',monospace; font-size:10px; color:#8a8477;}
</style>
</head>
<body>
  <div class="card">
    <div class="tab"></div>
    <div class="head">
      ${n.photo ? `<img src="${n.photo}" class="head-photo">` : ''}
      <div>
        <div class="role">${escapeHtml(n.title || 'Без названия')}</div>
        <div class="name">${escapeHtml(n.name || '—')}</div>
      </div>
    </div>
    <div class="body">
      <div class="field"><label>Отдел / заметка</label><div class="val">${escapeHtml(n.dept || '—')}</div></div>
      <div class="field"><label>Email</label><div class="val">${escapeHtml(n.email || '—')}</div></div>
      <div class="field"><label>Телефон</label><div class="val">${escapeHtml(n.phone || '—')}</div></div>
      <div class="field"><label>Руководитель</label><div class="val">${escapeHtml(managerName)}</div></div>
      <div class="field"><label>Подчинённые</label><ul>${subsHtml}</ul></div>
    </div>
    <div class="stamp">ID ${n.id.toUpperCase()} · сохранено ${new Date().toLocaleDateString('ru-RU')}</div>
  </div>
</body>
</html>`;
}

document.getElementById('d-download').onclick = () => {
  if(!selectedId) return;
  const n = nodes[selectedId];
  const html = buildStandaloneProfileHtml(n);
  const blob = new Blob([html], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const safeName = (n.name || n.title || 'anketa').replace(/[^a-zA-Zа-яА-Я0-9]+/g, '_');
  a.href = url;
  a.download = `anketa_${safeName}.html`;
  a.click();
  URL.revokeObjectURL(url);
};

document.getElementById('d-delete').onclick = async () => {
  if(!selectedId) return;
  const n = nodes[selectedId];
  if(!confirm(`Удалить должность «${n.title}»? Подчинённые перейдут к вышестоящему руководителю.`)) return;
  const parentId = n.managerId;
  children(selectedId).forEach(c => { c.managerId = parentId; });
  delete nodes[selectedId];
  await saveData();
  dossier.classList.remove('open');
  selectedId = null;
  render();
  applyTransform();
};

// ---- Export / Import ----
document.getElementById('export-btn').onclick = () => {
  const blob = new Blob([JSON.stringify(nodes, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'orgchart-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
};

document.getElementById('import-btn').onclick = () => document.getElementById('import-file').click();
document.getElementById('import-file').onchange = async (e) => {
  const file = e.target.files[0];
  if(!file) return;
  try{
    const text = await file.text();
    const parsed = JSON.parse(text);
    if(typeof parsed !== 'object' || Array.isArray(parsed)) throw new Error('bad format');
    nodes = parsed;
    await saveData();
    render();
    applyTransform();
  }catch(err){
    alert('Не удалось прочитать файл. Убедитесь, что это JSON, экспортированный отсюда же.');
  }
  e.target.value = '';
};

// ---- Solo mode (opened via a personal position link) ----
function enterSoloMode(id){
  document.body.classList.add('solo-mode');
  dossier.classList.add('solo');
  openDossier(id);
}
function exitSoloMode(){
  document.body.classList.remove('solo-mode');
  dossier.classList.remove('solo');
  dossier.classList.remove('open');
  selectedId = null;
  history.replaceState(null, '', window.location.pathname);
  render();
  applyTransform();
}
document.getElementById('dossier-back').addEventListener('click', (e) => {
  e.preventDefault();
  exitSoloMode();
});

// ---- Theme ----
const THEME_KEY = 'orgchart-theme-v1';
function applyThemeIcon(isLight){
  document.getElementById('theme-icon-moon').style.display = isLight ? 'none' : '';
  document.getElementById('theme-icon-sun').style.display = isLight ? '' : 'none';
}
function loadTheme(){
  const isLight = localStorage.getItem(THEME_KEY) === 'light';
  document.body.classList.toggle('light-theme', isLight);
  applyThemeIcon(isLight);
}
document.getElementById('theme-toggle').addEventListener('click', () => {
  const isLight = !document.body.classList.contains('light-theme');
  document.body.classList.toggle('light-theme', isLight);
  applyThemeIcon(isLight);
  try{ localStorage.setItem(THEME_KEY, isLight ? 'light' : 'dark'); }catch(e){}
});

// ---- Init ----
(async function init(){
  loadTheme();
  await loadData();
  render();
  applyTransform();

  // Deep link: opened via a position's personal URL (#p=ID) -> show only that profile.
  const match = window.location.hash.match(/^#p=(.+)$/);
  if(match && nodes[match[1]]){
    enterSoloMode(match[1]);
  }
})();

window.addEventListener('hashchange', () => {
  const m = window.location.hash.match(/^#p=(.+)$/);
  if(m && nodes[m[1]]) enterSoloMode(m[1]);
  else if(!window.location.hash && document.body.classList.contains('solo-mode')){
    exitSoloMode();
  }
});
</script>
</body>
</html>
